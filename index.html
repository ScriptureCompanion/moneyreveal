<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyReveal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>MoneyReveal</h1>
    <p class="tagline">Reveal where your money really goes</p>
    <p class="description">
      Upload a bank statement to detect subscriptions, recurring payments, and spending patterns.
    </p>

    <div class="upload-box">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" multiple>
         </div>

  <div id="results"></div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>
</body>
